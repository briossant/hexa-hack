version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hexahack
      POSTGRES_USER: hexahack
      POSTGRES_PASSWORD: hexahack
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hexahack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://hexahack:hexahack@postgres:5432/hexahack
      ANALYZER_URL: http://turing-trace-analyzer:3002
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      turing-trace-analyzer:
        condition: service_started
    restart: unless-stopped

  turing-trace-analyzer:
    build:
      context: .
      dockerfile: turing-trace-analyzer/Dockerfile
    expose:
      - "3002"
    env_file:
      - ./turing-trace-analyzer/.env
    environment:
      DATABASE_URL: postgresql://hexahack:hexahack@postgres:5432/hexahack
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "6767:80"
    depends_on:
      - backend
      - turing-trace-analyzer
    restart: unless-stopped

volumes:
  db-data:
